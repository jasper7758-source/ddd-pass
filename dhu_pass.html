// 固定比例（与你给的参数一致）
const DATE = { xRatio: 0.2403, yRatio: 0.3008, fontRatio: 0.0260 }; // 白色日期（Arial）
const TIME = { xRatio: 0.5000, yRatio: 0.4659, fontRatio: 0.0420 };  // 时间行（黑，秒加粗）

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d', {alpha:true});
const overlay = document.getElementById('timeOverlay');
const prefixEl = document.getElementById('prefix');
const secEl = document.getElementById('sec');
const img = new Image(); img.decoding = "async";

function pad(n){ return n<10 ? '0'+n : n; }
function dateStr(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }

// DPR 安全的 canvas 尺寸与绘制
function resizeCanvasForDPR() {
  const dpr = Math.max(1, window.devicePixelRatio || 1);
  const cssW = cv.clientWidth;
  const scale = cssW / img.naturalWidth;
  const cssH = Math.round(img.naturalHeight * scale);
  cv.width  = Math.round(cssW * dpr);
  cv.height = Math.round(cssH * dpr);
  cv.style.height = cssH + 'px';
  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(dpr, dpr);
}

function drawBase() {
  // 画背景图
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.drawImage(img, 0, 0, cv.clientWidth, cv.clientHeight);

  // 画白色日期（Arial）到红卡片
  const fsDate = Math.round(cv.clientWidth * DATE.fontRatio);
  ctx.font = `500 ${fsDate}px Arial, sans-serif`;
  ctx.fillStyle = '#ffffff';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,.35)';
  ctx.shadowBlur = Math.max(1, Math.round(fsDate*0.08));
  ctx.shadowOffsetX = Math.round(fsDate*0.03);
  ctx.shadowOffsetY = Math.round(fsDate*0.03);
  const xDate = Math.round(cv.clientWidth  * DATE.xRatio);
  const yDate = Math.round(cv.clientHeight * DATE.yRatio);
  ctx.fillText(dateStr(new Date()), xDate, yDate);
  ctx.shadowColor = 'transparent';
}

// 更新 HTML 覆盖层的时间，并按容器宽度设置字号与位置
function updateOverlay() {
  const cssW = cv.clientWidth;
  const cssH = cv.clientHeight; // 因为我们给了明确的 style.height

  // 设置字号与位置（均按 CSS 像素）
  const fsTime = Math.round(cssW * TIME.fontRatio);
  overlay.style.fontSize = fsTime + 'px';
  overlay.style.top = (cssH * TIME.yRatio) + 'px';
  overlay.style.left = '50%'; // 水平居中
  overlay.style.transform = 'translate(-50%, -50%)';

  const now = new Date();
  prefixEl.textContent = `${dateStr(now)} ${pad(now.getHours())}:${pad(now.getMinutes())}:`;
  secEl.textContent = pad(now.getSeconds());
}

function renderAll(){ resizeCanvasForDPR(); drawBase(); updateOverlay(); }

img.onload = () => { renderAll(); setInterval(updateOverlay, 1000); };
img.src = IMG_SRC;

window.addEventListener('resize', renderAll, {passive:true});
window.addEventListener('orientationchange', () => setTimeout(renderAll, 250), {passive:true});
</script>
